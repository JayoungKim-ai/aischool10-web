<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        flex: 0 0 250px; /* 늘지도 줄지도 않고 250px 고정 */
        background-color: #2c3e50;
        color: white;
        padding: 20px;
      }

      .main {
        flex: 1; /* 나머지 공간 모두 차지 */
        padding: 20px;
        background-color: #ecf0f1;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>사이드바</h2>
        <p>메뉴 영역</p>
      </aside>
      <main class="main">
        <h1>메인 콘텐츠</h1>
        <p>여기에 내용이 들어갑니다.</p>
      </main>
    </div>
  </body>
</html>
