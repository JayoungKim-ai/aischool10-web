<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제육볶음 레시피</title>
    <link rel="stylesheet" href="./css/레시피.css" />
  </head>
  <body>
    <!-- 
    1. `h1` 태그로 요리 제목 작성하기
    2. `p` 태그로 요리 소개글 작성하기
    3. `img` 태그로 요리 이미지 넣기
    4. `ul` 태그로 재료 목록 나열하기
    5. `ol` 태그를 사용하여 조리 순서(1단계, 2단계...) 작성하기
    6. `a` 태그를 사용하여 '요리 영상 보러가기' 링크 걸기 (새 탭 열기 기능 포함)
    7. 중요한 부분은 `<strong>` 태그로 굵게 표시하기 -->
    <h1>제육볶음</h1>
    <p>
      목전지살로 만드는 <span style="color: red">기사식당 스타일</span>의 맛있는
      레시피입니다.
    </p>
    <img src="img/recipe.png" width="200px" />
    <img src="img/recipe.png" width="200px" />
    <img src="img/recipe.png" width="200px" />
    <h3>재료</h3>
    <ul>
      <li><strong>돼지고기 목전지 600g</strong></li>
      <li>식용유 3스푼</li>
      <li>설탕 2스푼</li>
      <li>다진마늘 1스푼</li>
      <li>고추장 1스푼</li>
      <li>...</li>
    </ul>
    <h3>조리순서</h3>
    <ol>
      <li>다진마늘, 식용유, 설탕을 약불에 끓입니다</li>
      <li>목전지를 넣고 강불에서 80% 익힙니다.</li>
      <li>양념을 넣고 고기가 다 익을때까지 익힙니다.</li>
      <li>양파와 파를 넣고 익힙니다.</li>
      <li>불을 끄고 참기름과 통깨로 마무리</li>
    </ol>
    <p>
      <a
        href="https://youtube.com/shorts/rLEyOHvGb1Y?si=Dzog-w-mJovPKC8Q"
        target="_blank"
        >요리영상 보러가기</a
      >
    </p>
    <div>
      <video src="img/357054_medium.mp4" controls width="400px"></video>
    </div>
    <div>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/Bt0PPGfItZw?si=L8nsODrNwqHKAoSr"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
    <div>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.510920099812!2d126.97820379999999!3d37.5665851!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2f332cb082b%3A0xe92b70ac420cf0a8!2z7ISc7Jq47Yq567OE7Iuc7LKt!5e0!3m2!1sko!2skr!4v1781580346797!5m2!1sko!2skr"
        width="400"
        height="250"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <iframe
      src="https://naver.me/GzdlUGls"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
