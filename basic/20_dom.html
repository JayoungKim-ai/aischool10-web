<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

      .highlight {
        background: yellow;
        font-weight: bold;
      }
    </style>
  </head>

    <button id="btn">강조 토글</button>
    <!-- 요소 추가 -->
    <br /><br /><br /><br /><br />
    <button id="addBtn">항목 추가</button>
    <ul id="list">
      <li>기존 항목</li>
    </ul>
